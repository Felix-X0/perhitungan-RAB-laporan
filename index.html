<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SipilPro - Dashboard Administrasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar no-print">
            <a href="index.html" class="active">🏠 Dashboard Proyek</a>
            <a href="rab.html">📊 Penyusunan RAB</a>
            <a href="laporan.html">🖨️ Laporan Progres Fisik</a>
        </nav>

        <header>
            <h1>SipilPro: Manajemen Pengendalian Proyek</h1>
            <p class="subtitle">Data Administrasi dan Legalitas Kontrak Konstruksi</p>
        </header>

        <section>
            <h2>Input Dokumen Administrasi Proyek</h2>
            <div class="grid-form">
                <div class="form-group">
                    <label>Nama Paket Pekerjaan</label>
                    <input type="text" id="p_name" value="Pembangunan Fasilitas Air Bersih Kelurahan">
                </div>
                <div class="form-group">
                    <label>Lokasi Proyek</label>
                    <input type="text" id="p_loc" value="Kabupaten Sumedang, Jawa Barat">
                </div>
                <div class="form-group">
                    <label>Nomor Kontrak Kerja</label>
                    <input type="text" id="p_contract" value="602/04/SPK/PU-PR/2026">
                </div>
                <div class="form-group">
                    <label>Instansi Pemilik (Owner)</label>
                    <input type="text" id="p_owner" value="Dinas Pekerjaan Umum Daerah">
                </div>
                <div class="form-group">
                    <label>Perusahaan Kontraktor</label>
                    <input type="text" id="p_contractor" value="PT. Karya Sarana Sipil">
                </div>
                <div class="form-group">
                    <label>Konsultan Pengawas</label>
                    <input type="text" id="p_supervisor" value="CV. Rekayasa Konsultan Utama">
                </div>
            </div>
            <div style="margin-top: 25px; text-align: center;">
                <button class="btn btn-blue" onclick="saveProjectInfo()">💾 Simpan Data Administrasi & Lanjut</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
