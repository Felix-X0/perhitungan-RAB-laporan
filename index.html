<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SipilPro - Dashboard Administrasi Proyek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar no-print">
            <a href="index.html" class="active">🏠 Dashboard Proyek</a>
            <a href="rab.html">📊 Penyusunan RAB</a>
            <a href="laporan.html">🖨️ Laporan Progres Fisik</a>
        </nav>

        <header>
            <h1>SipilPro: Sistem Informasi Manajemen Konstruksi</h1>
            <p class="subtitle">Input Data Administrasi & Kontrak Utama Proyek</p>
        </header>

            <section>
                <h2>Informasi & Identitas Proyek</h2>
                <div class="grid-form">
                    <div class="form-group">
                        <label for="p_name">Nama Pekerjaan / Proyek:</label>
                        <input type="text" id="p_name" placeholder="Contoh: Pembangunan Fasilitas Air Bersih">
                    </div>
                    <div class="form-group">
                        <label for="p_contract">Nomor Kontrak / SPK:</label>
                        <input type="text" id="p_contract" placeholder="Contoh: 027/615/SPK/2026">
                    </div>
                    <div class="form-group">
                        <label for="p_loc">Lokasi Proyek:</label>
                        <input type="text" id="p_loc" placeholder="Contoh: Kelurahan Makmur">
                    </div>
                    <div class="form-group">
                        <label for="p_owner">Pemilik Proyek (Owner / Dinas):</label>
                        <input type="text" id="p_owner" placeholder="Contoh: Dinas Pekerjaan Umum">
                    </div>
                    <div class="form-group">
                        <label for="p_contractor">Kontraktor Pelaksana:</label>
                        <input type="text" id="p_contractor" placeholder="Contoh: CV. Bangun Sarana">
                    </div>
                    <div class="form-group">
                        <label for="p_supervisor">Konsultan Pengawas / Direksi:</label>
                        <input type="text" id="p_supervisor" placeholder="Contoh: PT. Citra Prima">
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: center;">
                    <button class="btn btn-blue" style="font-size: 1rem; padding: 12px 35px;" onclick="saveProjectInfo()">➡️ Simpan & Lanjutkan ke RAB</button>
                </div>
            </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
